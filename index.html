<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurélien Boudon — Développeur Full Stack</title>
    <meta name="description" content="Développeur Full Stack freelance — React, TypeScript, Python, Docker. Je prends en charge chaque couche de votre projet web." />
    <meta name="author" content="Aurélien Boudon" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://devzair.fr/" />

    <!-- Thème mobile -->
    <meta name="theme-color" content="#0d0d14" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://devzair.fr/" />
    <meta property="og:site_name" content="devZair" />
    <meta property="og:title" content="Aurélien Boudon — Développeur Full Stack" />
    <meta property="og:description" content="Développeur Full Stack freelance — React, TypeScript, Python, Docker. Je prends en charge chaque couche de votre projet web." />
    <meta property="og:image" content="https://devzair.fr/devzair.webp" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />
    <meta property="og:image:alt" content="Logo devZair — Aurélien Boudon" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aurélien Boudon — Développeur Full Stack" />
    <meta name="twitter:description" content="Développeur Full Stack freelance — React, TypeScript, Python, Docker. Je prends en charge chaque couche de votre projet web." />
    <meta name="twitter:image" content="https://devzair.fr/devzair.webp" />

    <!-- Hreflang (SPA bilingue sur le même domaine) -->
    <link rel="alternate" hreflang="fr" href="https://devzair.fr/" />
    <link rel="alternate" hreflang="en" href="https://devzair.fr/" />
    <link rel="alternate" hreflang="x-default" href="https://devzair.fr/" />

    <!-- Données structurées JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Aurélien Boudon",
      "url": "https://devzair.fr",
      "jobTitle": "Développeur Full Stack",
      "description": "Développeur Full Stack freelance spécialisé React, TypeScript, Python et Docker.",
      "image": "https://devzair.fr/devzair.webp",
      "sameAs": [
        "https://github.com/devzair-officiel"
      ]
    }
    </script>

    <!-- LCP image preload -->
    <link rel="preload" as="image" href="/vague_mobile.webp" fetchpriority="high" />

    <!-- API preconnect -->
    <link rel="preconnect" href="https://api-portfolio.devzair.fr" crossorigin />
    <link rel="dns-prefetch" href="https://api-portfolio.devzair.fr" />

    <!-- Fonts: preconnect + chargement non-bloquant -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
