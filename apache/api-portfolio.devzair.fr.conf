# HTTP → redirect HTTPS
<VirtualHost *:80>
    ServerName api-portfolio.devzair.fr
    Redirect permanent / https://api-portfolio.devzair.fr/
</VirtualHost>

# HTTPS → proxy vers FastAPI
<VirtualHost *:443>
    ServerName api-portfolio.devzair.fr

    Protocols h2 http/1.1

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/api-portfolio.devzair.fr/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/api-portfolio.devzair.fr/privkey.pem

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    # Nécessaire pour les WebSockets éventuels
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:8000/$1 [P,L]
</VirtualHost>
