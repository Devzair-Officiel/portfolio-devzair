# HTTP → redirect HTTPS
<VirtualHost *:80>
    ServerName devzair.fr
    ServerAlias www.devzair.fr
    Redirect permanent / https://devzair.fr/
</VirtualHost>

# HTTPS → proxy vers Caddy (frontend)
<VirtualHost *:443>
    ServerName devzair.fr
    ServerAlias www.devzair.fr

    SSLEngine on
    # Remplace par tes chemins de certificats (Certbot ou OVH)
    SSLCertificateFile    /etc/letsencrypt/live/devzair.fr/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/devzair.fr/privkey.pem

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8081/
    ProxyPassReverse / http://127.0.0.1:8081/
</VirtualHost>
