services:

  # ─── Base de données ───────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: devzair-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── API FastAPI ───────────────────────────────────────────────────────────
  api:
    build:
      context: ../portfolio-devzair-api
      dockerfile: Dockerfile
    container_name: devzair-api
    restart: unless-stopped
    env_file: .env
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - web

  # ─── Frontend React + Caddy ────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: devzair-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - web

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
