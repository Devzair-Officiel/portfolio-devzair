services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Persistance des certificats TLS Caddy (HTTPS automatique)
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
